<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Master Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📄 PDF Master Pro</h1>
        <p style="text-align:center; color:#555;">অফলাইন • মডুলার • এক্সটেন্সিবল</p>

        <div id="dropZone" class="drop-zone">
            <p>PDF ফাইল ড্র্যাগ করুন অথবা ক্লিক করুন</p>
            <input type="file" id="fileInput" multiple accept="application/pdf" style="display:none;">
        </div>

        <div class="options" id="optionsPanel"></div>

        <div class="controls">
            <button class="primary" id="processBtn" disabled>🚀 প্রসেস করুন</button>
            <button id="resetBtn">রিসেট</button>
            <label><input type="checkbox" id="darkMode"> ডার্ক মোড</label>
        </div>

        <div id="status"></div>
        <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        <div id="preview" class="preview"></div>

        <a id="downloadLink" style="display:none;" download>
            <button class="success">⬇️ ডাউনলোড করুন</button>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- মেইন স্ক্রিপ্ট -->
    <script src="script.js" type="module"></script>
</body>
</html>
